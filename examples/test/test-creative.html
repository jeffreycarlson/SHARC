<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHARC Test Creative</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      width: 100%;
      height: 100%;
      min-height: 250px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ad-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      max-width: 280px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ad-card.visible {
      transform: translateY(0);
      opacity: 1;
    }
    .ad-logo {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 14px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    h2 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    p {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
      margin-bottom: 20px;
    }
    .cta-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s;
    }
    .cta-btn:hover { opacity: 0.9; }
    .cta-btn:active { opacity: 0.8; transform: scale(0.98); }
    .state-badge {
      display: inline-block;
      margin-top: 12px;
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .close-btn {
      position: fixed;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.4);
      color: white;
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .close-btn:hover { background: rgba(0,0,0,0.6); }
    .debug-log {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.7);
      color: #0f0;
      font-size: 10px;
      font-family: monospace;
      padding: 4px 8px;
      max-height: 80px;
      overflow-y: auto;
    }
    .debug-log div { margin: 1px 0; }
    .log-recv { color: #88f; }
    .log-sent { color: #8f8; }
    .log-info { color: #ff8; }
  </style>
</head>
<body>

<div class="ad-card" id="adCard">
  <div class="ad-logo">🎯</div>
  <h2>SHARC Test Ad</h2>
  <p>This is a test SHARC-enabled creative. It demonstrates the full protocol lifecycle.</p>
  <button class="cta-btn" id="ctaBtn">Learn More</button>
  <div class="state-badge" id="stateBadge">initializing...</div>
</div>

<button class="close-btn" id="closeBtn" title="Request Close">✕</button>

<div class="debug-log" id="debugLog"></div>

<!-- Load the SHARC SDK -->
<script src="../sharc-protocol.js"></script>
<script src="../sharc-creative.js"></script>
<script>
  // -------------------------------------------------------------------------
  // Creative debug logger
  // -------------------------------------------------------------------------
  const logEl = document.getElementById('debugLog');
  function addLog(text, cls) {
    const d = document.createElement('div');
    d.className = cls || 'log-info';
    d.textContent = `[${new Date().toISOString().substr(11,8)}] ${text}`;
    logEl.appendChild(d);
    logEl.scrollTop = logEl.scrollHeight;
  }

  // -------------------------------------------------------------------------
  // SHARC Creative Implementation
  // -------------------------------------------------------------------------

  // onReady: called when Container:init received
  // Configure the creative based on environment data
  SHARC.onReady(async (env, features) => {
    addLog('onReady called', 'log-recv');
    addLog(`env: muted=${env.isMuted}, version=${env.version}`, 'log-info');

    // Check feature support
    if (features && features.length > 0) {
      addLog(`features: ${features.map(f => f.name || f).join(', ')}`, 'log-info');
    }

    // Update state badge
    document.getElementById('stateBadge').textContent = 'ready — waiting to start';

    // Simulate asset loading (quick in this test)
    await new Promise(resolve => setTimeout(resolve, 100));

    addLog('onReady resolved — assets loaded', 'log-sent');
    // Promise resolved → container will send startCreative
  });

  // onStart: called when Container:startCreative received
  SHARC.onStart(async () => {
    addLog('onStart called', 'log-recv');

    // Animate the ad card in
    const card = document.getElementById('adCard');
    card.classList.add('visible');
    document.getElementById('stateBadge').textContent = 'active';

    addLog('onStart resolved — creative is visible', 'log-sent');
  });

  // State change listener
  SHARC.on('stateChange', (state) => {
    addLog(`stateChange → ${state}`, 'log-recv');
    const badge = document.getElementById('stateBadge');
    badge.textContent = state;

    // React to lifecycle states
    if (state === 'hidden' || state === 'frozen') {
      // Pause any animations/media
      document.getElementById('adCard').style.animationPlayState = 'paused';
    } else if (state === 'active') {
      document.getElementById('adCard').style.animationPlayState = 'running';
    }
  });

  // Placement change listener
  SHARC.on('placementChange', (placement) => {
    addLog(`placementChange: ${JSON.stringify(placement)}`, 'log-recv');
  });

  // Close handler: runs when Container:close received
  // Gets up to ~1.8 seconds (SDK watchdog enforces the limit)
  SHARC.on('close', () => {
    addLog('Container:close received — running close sequence', 'log-recv');
    const card = document.getElementById('adCard');
    card.style.transition = 'all 0.3s ease';
    card.style.transform = 'scale(0.8)';
    card.style.opacity = '0';
    addLog('Close animation started', 'log-info');
    // Return a promise — SDK waits for it (up to watchdog limit)
    return new Promise(resolve => setTimeout(resolve, 400));
  });

  // -------------------------------------------------------------------------
  // UI Interactions
  // -------------------------------------------------------------------------

  // CTA button → click through
  document.getElementById('ctaBtn').addEventListener('click', () => {
    addLog('CTA clicked — requesting navigation', 'log-sent');
    SHARC.requestNavigation({
      url: 'https://www.iabtechlab.com',
      target: 'clickthrough',
    });
    SHARC.reportInteraction([
      // In a real ad, these would be actual tracker URLs
      // 'https://tracker.example.com/click?ts=' + Date.now(),
    ]);
    addLog('reportInteraction sent', 'log-sent');
  });

  // Creative-provided close button → request close
  document.getElementById('closeBtn').addEventListener('click', () => {
    addLog('Creative close btn clicked — requesting close', 'log-sent');
    SHARC.requestClose().then(() => {
      addLog('requestClose resolved', 'log-info');
    }).catch((err) => {
      addLog(`requestClose rejected: ${JSON.stringify(err)}`, 'log-info');
    });
  });

</script>
</body>
</html>
