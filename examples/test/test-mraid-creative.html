<!doctype html>
<!--
  test-mraid-creative.html — Test MRAID Creative

  A realistic simulation of a MRAID 2.0/3.0 banner ad that exercises the
  SHARC MRAID bridge. Uses standard MRAID defensive patterns.

  This creative is loaded inside mraid-wrapper.html which provides window.mraid.
  It can also be loaded standalone for visual inspection (mraid will be missing).
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Test MRAID Creative</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Ad Banner ────────────────────────────────────────────── */
    #ad-banner {
      background: linear-gradient(135deg, #e94560 0%, #0f3460 100%);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 60px;
      flex-shrink: 0;
      cursor: pointer;
      user-select: none;
    }
    #ad-banner .brand {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
    }
    #ad-banner .cta {
      background: #fff;
      color: #e94560;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    #ad-banner .badge {
      font-size: 10px;
      color: rgba(255,255,255,0.6);
      margin-top: 2px;
    }
    .brand-wrap { display: flex; flex-direction: column; }

    /* ── Ad State Display ─────────────────────────────────────── */
    #ad-state {
      background: rgba(0,0,0,0.4);
      padding: 8px 16px;
      font-size: 11px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    .state-item { display: flex; gap: 4px; align-items: center; }
    .state-label { color: rgba(255,255,255,0.5); }
    .state-value { color: #e94560; font-weight: 600; font-family: monospace; }
    .state-value.ok { color: #4ade80; }
    .state-value.warn { color: #fb923c; }

    /* ── Ad Controls ──────────────────────────────────────────── */
    #ad-controls {
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex-shrink: 0;
      background: rgba(0,0,0,0.2);
    }
    .ad-btn {
      background: #0f3460;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .ad-btn:hover { background: #16213e; }
    .ad-btn:active { background: #e94560; }
    .ad-btn.danger { border-color: #e94560; color: #e94560; }

    /* ── Protocol Log ─────────────────────────────────────────── */
    #log-header {
      padding: 6px 16px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.4);
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    #protocol-log {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      line-height: 1.6;
    }
    .log-entry {
      padding: 2px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .log-entry .ts { color: rgba(255,255,255,0.3); margin-right: 6px; }
    .log-entry.event .msg { color: #60a5fa; }
    .log-entry.action .msg { color: #a78bfa; }
    .log-entry.error .msg { color: #f87171; }
    .log-entry.info .msg { color: rgba(255,255,255,0.6); }
    .log-entry.ok .msg { color: #4ade80; }

    /* ── No-mraid fallback ────────────────────────────────────── */
    #no-mraid {
      display: none;
      padding: 20px;
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 13px;
    }
  </style>
</head>
<body>

  <!-- Ad Banner -->
  <div id="ad-banner">
    <div class="brand-wrap">
      <div class="brand">⚡ SHARC Demo</div>
      <div class="badge">MRAID 3.0 Creative</div>
    </div>
    <div class="cta" id="cta-btn">Learn More</div>
  </div>

  <!-- Live State Display -->
  <div id="ad-state">
    <div class="state-item">
      <span class="state-label">state:</span>
      <span class="state-value" id="disp-state">loading</span>
    </div>
    <div class="state-item">
      <span class="state-label">viewable:</span>
      <span class="state-value" id="disp-viewable">—</span>
    </div>
    <div class="state-item">
      <span class="state-label">placement:</span>
      <span class="state-value" id="disp-placement">—</span>
    </div>
    <div class="state-item">
      <span class="state-label">version:</span>
      <span class="state-value" id="disp-version">—</span>
    </div>
    <div class="state-item">
      <span class="state-label">muted:</span>
      <span class="state-value" id="disp-muted">—</span>
    </div>
  </div>

  <!-- Creative Controls -->
  <div id="ad-controls">
    <button class="ad-btn" onclick="testExpand()">expand()</button>
    <button class="ad-btn" onclick="testCollapse()">collapse()</button>
    <button class="ad-btn danger" onclick="testClose()">close()</button>
    <button class="ad-btn" onclick="testOpen()">open(url)</button>
    <button class="ad-btn" onclick="testSupports()">supports()</button>
    <button class="ad-btn" onclick="testStorePicture()">storePicture()</button>
    <button class="ad-btn" onclick="testResize()">resize()</button>
    <button class="ad-btn" onclick="testExpandUrl()">expand(url)</button>
    <button class="ad-btn" onclick="clearLog()">Clear Log</button>
  </div>

  <div id="log-header">MRAID Event Log</div>

  <!-- Protocol Log -->
  <div id="protocol-log">
    <div class="log-entry info">
      <span class="ts">[init]</span>
      <span class="msg">MRAID creative loaded. Waiting for window.mraid...</span>
    </div>
  </div>

  <div id="no-mraid">
    window.mraid not available.<br>
    Load this creative via mraid-wrapper.html?creative=test-mraid-creative.html
  </div>

  <script>
    'use strict';

    /* ── Logging helpers ─────────────────────────────────────── */
    var logEl = document.getElementById('protocol-log');

    function logEntry(type, msg) {
      var entry = document.createElement('div');
      entry.className = 'log-entry ' + type;
      var ts = new Date().toISOString().slice(11, 23);
      entry.innerHTML =
        '<span class="ts">[' + ts + ']</span>' +
        '<span class="msg">' + escHtml(String(msg)) + '</span>';
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function clearLog() {
      logEl.innerHTML = '';
      logEntry('info', 'Log cleared.');
    }

    /* ── State display update ────────────────────────────────── */
    function updateDisplay() {
      if (typeof window.mraid === 'undefined') return;
      var m = window.mraid;
      var stateEl = document.getElementById('disp-state');
      var state = m.getState();
      stateEl.textContent = state;
      stateEl.className = 'state-value ' + (state === 'default' || state === 'expanded' ? 'ok' : state === 'hidden' ? 'warn' : '');

      var viewableEl = document.getElementById('disp-viewable');
      var viewable = m.isViewable();
      viewableEl.textContent = String(viewable);
      viewableEl.className = 'state-value ' + (viewable ? 'ok' : 'warn');

      document.getElementById('disp-placement').textContent = m.getPlacementType();
      document.getElementById('disp-version').textContent = m.getVersion();
      document.getElementById('disp-muted').textContent = String(m.isAudioMuted());
    }

    /* ── MRAID event handlers ────────────────────────────────── */
    function onMraidReady() {
      logEntry('ok', '✓ ready event fired');
      logEntry('info', '  getVersion()       = ' + mraid.getVersion());
      logEntry('info', '  getState()         = ' + mraid.getState());
      logEntry('info', '  isViewable()       = ' + mraid.isViewable());
      logEntry('info', '  getPlacementType() = ' + mraid.getPlacementType());
      logEntry('info', '  isAudioMuted()     = ' + mraid.isAudioMuted());

      var defPos = mraid.getDefaultPosition();
      logEntry('info', '  getDefaultPosition() = ' + JSON.stringify(defPos));
      var maxSize = mraid.getMaxSize();
      logEntry('info', '  getMaxSize()         = ' + JSON.stringify(maxSize));
      var scrSize = mraid.getScreenSize();
      logEntry('info', '  getScreenSize()      = ' + JSON.stringify(scrSize));

      updateDisplay();
    }

    function onStateChange(state) {
      logEntry('event', '▶ stateChange("' + state + '")');
      updateDisplay();
    }

    function onViewableChange(viewable) {
      logEntry('event', '👁 viewableChange(' + viewable + ')');
      updateDisplay();
    }

    function onSizeChange(w, h) {
      logEntry('event', '📐 sizeChange(' + w + ', ' + h + ')');
      updateDisplay();
    }

    function onError(message, action) {
      logEntry('error', '⚠ error("' + message + '", "' + action + '")');
    }

    function onUnload() {
      logEntry('event', '💀 unload event fired');
    }

    /* ── Test action functions ───────────────────────────────── */
    function testExpand() {
      logEntry('action', 'mraid.expand() →');
      mraid.expand();
    }

    function testCollapse() {
      logEntry('action', 'mraid.collapse() →');
      mraid.collapse();
    }

    function testClose() {
      logEntry('action', 'mraid.close() →');
      mraid.close();
    }

    function testOpen() {
      logEntry('action', 'mraid.open("https://iabtechlab.com") →');
      mraid.open('https://iabtechlab.com');
    }

    function testSupports() {
      var features = ['sms', 'tel', 'calendar', 'storePicture', 'inlineVideo', 'vpaid', 'location'];
      features.forEach(function (f) {
        logEntry('info', '  supports("' + f + '") = ' + mraid.supports(f));
      });
    }

    function testStorePicture() {
      logEntry('action', 'mraid.storePicture("...") → (should fire error)');
      mraid.storePicture('https://example.com/pic.jpg');
    }

    function testResize() {
      logEntry('action', 'mraid.resize() → (deferred v2; should fire error)');
      mraid.setResizeProperties({ width: 320, height: 200, offsetX: 0, offsetY: 0 });
      mraid.resize();
    }

    function testExpandUrl() {
      logEntry('action', 'mraid.expand("https://...") → (not supported; should fire error)');
      mraid.expand('https://example.com/expanded.html');
    }

    /* ── CTA click ───────────────────────────────────────────── */
    document.getElementById('cta-btn').addEventListener('click', function (e) {
      e.stopPropagation();
      logEntry('action', 'CTA clicked → mraid.open("https://iabtechlab.com")');
      if (window.mraid) {
        mraid.open('https://iabtechlab.com');
      }
    });

    document.getElementById('ad-banner').addEventListener('click', function () {
      logEntry('action', 'Banner clicked → mraid.expand()');
      if (window.mraid && mraid.getState() === 'default') {
        mraid.expand();
      }
    });

    /* ── Bootstrap — standard MRAID defensive pattern ────────── */
    (function bootstrap() {
      // Check if mraid is available (loaded via mraid-wrapper.html)
      // Try window.parent.mraid for iframe-loaded creatives too
      var m = window.mraid || (window.parent && window.parent !== window && window.parent.mraid);

      if (!m) {
        logEntry('error', 'window.mraid not found. Load via mraid-wrapper.html');
        document.getElementById('no-mraid').style.display = 'block';
        return;
      }

      // Alias for convenience (global mraid var, standard pattern)
      window.mraid = m; // ensure it's on this window

      // Register all event listeners BEFORE the state check
      mraid.addEventListener('ready', onMraidReady);
      mraid.addEventListener('stateChange', onStateChange);
      mraid.addEventListener('viewableChange', onViewableChange);
      mraid.addEventListener('sizeChange', onSizeChange);
      mraid.addEventListener('error', onError);
      mraid.addEventListener('unload', onUnload);

      logEntry('info', 'mraid object found. getState() = "' + mraid.getState() + '"');

      // Standard MRAID defensive pattern (§4 Bootstrap)
      if (mraid.getState() === 'loading') {
        logEntry('info', 'State is "loading" — waiting for ready event...');
      } else {
        // Race condition path: init already completed
        logEntry('ok', 'State is "' + mraid.getState() + '" — calling onMraidReady directly');
        onMraidReady();
      }

      updateDisplay();
    }());
  </script>
</body>
</html>
