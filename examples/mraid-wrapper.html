<!doctype html>
<!--
  mraid-wrapper.html — Same-origin MRAID creative wrapper page

  This page is loaded inside the SHARC container iframe instead of the MRAID
  creative directly. It establishes the SHARC SDK and MRAID bridge before
  loading the creative, satisfying the MRAID contract that window.mraid is
  available synchronously before the creative's first <script> runs.

  Load order (per mraid-bridge-design.md §4):
    1. sharc-protocol.js  → window.SHARC.Protocol
    2. sharc-creative.js  → window.SHARC (full SDK)
    3. sharc-mraid-bridge.js → window.mraid

  Then the creative is loaded via ?creative=<url>.

  Usage:
    /sharc/mraid-wrapper.html?creative=https%3A%2F%2Fexample.com%2Fad.html

  For same-origin test creatives, a relative path works:
    mraid-wrapper.html?creative=test/test-mraid-creative.html
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MRAID Wrapper</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
  </style>

  <!--
    Scripts MUST load synchronously in this order.
    Each script runs to completion before the next one starts,
    ensuring window.mraid is available before creative code executes.
  -->
  <script src="sharc-protocol.js"></script>
  <script src="sharc-creative.js"></script>
  <script src="sharc-mraid-bridge.js"></script>
</head>
<body>
  <script>
    (function () {
      'use strict';

      var params = new URLSearchParams(location.search);
      var creativeUrl = params.get('creative');

      if (!creativeUrl) {
        console.error('[MRAID Wrapper] No ?creative= parameter provided.');
        return;
      }

      // Resolve the creative URL relative to the wrapper's own location.
      // This handles both absolute URLs and relative paths safely.
      var resolvedUrl;
      try {
        resolvedUrl = new URL(creativeUrl, location.href).href;
      } catch (e) {
        console.error('[MRAID Wrapper] Invalid creative URL:', creativeUrl);
        return;
      }

      // Security: only load http(s) and same-origin relative URLs.
      // Block javascript: and data: schemes.
      var allowedSchemes = ['http:', 'https:'];
      var parsed;
      try {
        parsed = new URL(resolvedUrl);
      } catch (e) {
        console.error('[MRAID Wrapper] Could not parse creative URL:', resolvedUrl);
        return;
      }

      if (allowedSchemes.indexOf(parsed.protocol) === -1) {
        console.error('[MRAID Wrapper] Blocked creative URL with disallowed scheme:', parsed.protocol);
        return;
      }

      // Detect whether the creative URL is an HTML page or a JS file.
      // HTML creatives are loaded in an iframe; JS-only creatives are script-injected.
      var pathname = parsed.pathname || '';
      var isHtml = !pathname.match(/\.js(\?|$)/i);

      if (isHtml) {
        // HTML creative: embed in a full-page iframe.
        // The parent (this page) already has window.mraid available; the iframe
        // needs it too. Since this is same-origin, the iframe will inherit
        // this page's scripts (they share the same origin scope via window.parent).
        //
        // For cross-origin MRAID HTML creatives, the container injects scripts
        // via the MRAIDCompatBridge wrapper pattern instead of this iframe approach.
        // For same-origin test creatives, an iframe pointing to the creative HTML
        // is the cleanest approach.
        //
        // However, the simplest and most compatible approach for MRAID HTML creatives
        // is to inject their content directly into this document. We do that via a
        // fetch + innerHTML for same-origin creatives, or a sandboxed iframe for
        // cross-origin ones.
        //
        // For the reference implementation: load same-origin HTML creatives via
        // document.write equivalent — append an iframe that has access to parent's mraid.

        // Actually, per design doc §4, the wrapper loads the creative URL as a script.
        // For HTML creatives, we need a different strategy. The cleanest for a
        // reference impl: create a sandboxed div and load the creative's body content.
        // But cross-origin fetch won't work. So we use an iframe with allow-scripts
        // and inject mraid via window.parent.

        // Simplest correct approach: create an iframe pointing to the creative.
        // Same-origin iframes can access window.parent.mraid.
        // The creative just needs: var mraid = window.parent.mraid || window.mraid;
        // But many MRAID creatives use window.mraid directly.
        //
        // For the reference implementation, we serve both the wrapper and the test
        // creative from the same origin, so we use a full-page iframe and expose
        // mraid on the iframe's window via the contentWindow reference.

        var iframe = document.createElement('iframe');
        iframe.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;border:none;margin:0;padding:0;';
        iframe.setAttribute('scrolling', 'no');
        iframe.setAttribute('frameborder', '0');

        // Once the iframe loads, inject mraid into its window (same-origin only)
        iframe.addEventListener('load', function () {
          try {
            if (iframe.contentWindow && !iframe.contentWindow.mraid) {
              iframe.contentWindow.mraid = window.mraid;
            }
          } catch (e) {
            // Cross-origin — creative must access mraid via window.parent.mraid
            console.warn('[MRAID Wrapper] Cannot inject mraid into cross-origin iframe. Creative must use window.parent.mraid.');
          }
        });

        iframe.src = resolvedUrl;
        document.body.appendChild(iframe);

      } else {
        // JS-only creative: inject as a script tag.
        // window.mraid is already available (set by sharc-mraid-bridge.js above).
        var script = document.createElement('script');
        script.src = resolvedUrl;
        script.onerror = function () {
          console.error('[MRAID Wrapper] Failed to load creative script:', resolvedUrl);
        };
        document.body.appendChild(script);
      }
    }());
  </script>
</body>
</html>
